[package]
name = "link"
version = "0.1.0"
edition = "2024"

[dev-dependencies]
async-ringbuffer = "0.5.5"
async-channel = "2.3"
critical-section = { version = "1.2", features = ["std"] }
embedded-io-adapters = { version = "0.6", features = ["futures-03"], default-features = false }
virtual-serialport = "0.1.3"
tokio = { version = "1.48.0", features = ["full"] }

[features]
# Chip module features - each instantiation crate enables only what it needs
mgmt = []
net = []
ui = []
ctl = ["std"]  # ctl requires std

# All modules enabled - for development and testing
all = ["mgmt", "net", "ui", "ctl"]
default = ["all", "defmt"]

# Logging
defmt = ["dep:defmt", "heapless/defmt"]
trace-tlv = ["defmt"]  # Verbose TLV read/write logging

# Platform features
std = ["dep:md-5", "dep:miniz_oxide"]
audio-buffer = ["dep:embassy-time"]  # Enable jitter buffering for audio playback

[dependencies]
defmt = { version = "1", optional = true }
embassy-sync = "0.7.0"
embedded-hal = "1.0"
embedded-hal-async = "1.0"
embedded-io-async = "0.6"
futures = { version = "0.3", default-features = false, features = ["async-await"] }
heapless = { version = "0.9", features = ["serde"] }
num_enum = { version = "0.7.5", default-features = false }
portable-atomic = { version = "1", features = ["critical-section"] }
serde = { version = "1", default-features = false, features = ["derive"] }
postcard = "1"
embedded-storage = "0.3"
aes-gcm = { version = "0.10", default-features = false, features = ["aes"] }
hkdf = { version = "0.12", default-features = false }
sha2 = { version = "0.10", default-features = false }
embassy-futures = "0.1.2"
embassy-time = { version = "0.4", optional = true }
md-5 = { version = "0.10", optional = true, default-features = false }
miniz_oxide = { version = "0.8", optional = true, default-features = false, features = ["with-alloc"] }
audio-codec-algorithms = { version = "0.7", default-features = false }
