name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting (link)
        run: cargo fmt --manifest-path link/Cargo.toml -- --check
      - name: Check formatting (ctl)
        run: cargo fmt --manifest-path ctl/Cargo.toml -- --check
      - name: Check formatting (web-ctl)
        run: cargo fmt --manifest-path web-ctl/Cargo.toml -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (link with std)
        run: cargo clippy --manifest-path link/Cargo.toml --features std
      - name: Clippy (ctl)
        run: cargo clippy --manifest-path ctl/Cargo.toml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests (link)
        run: cargo test --manifest-path link/Cargo.toml --features std

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (link with std)
        run: cargo build --manifest-path link/Cargo.toml --features std
      - name: Build (ctl)
        run: cargo build --manifest-path ctl/Cargo.toml

  # Firmware builds require special toolchains and are not yet automated.
  # - mgmt: thumbv6m-none-eabi (STM32F072)
  # - ui: thumbv7em-none-eabihf (STM32F405)
  # - net: xtensa-esp32s3-none-elf (ESP32-S3, requires espup)
