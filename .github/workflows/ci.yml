name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: link
            target: x86_64-unknown-linux-gnu
            features: "--features std"
            apt: libudev-dev
          - crate: ctl
            target: x86_64-unknown-linux-gnu
            apt: libudev-dev
          - crate: web-ctl
            target: wasm32-unknown-unknown
            wasm-pack: true
            rustflags: "--cfg=web_sys_unstable_apis"
          - crate: mgmt
            target: thumbv6m-none-eabi
            release: true
          - crate: ui
            target: thumbv7em-none-eabihf
            release: true
          - crate: net
            target: xtensa-esp32s3-espidf
            espup: true
            release: true
            skip-clippy: true
    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Install espup toolchain
        if: matrix.espup
        run: |
          curl -L https://github.com/esp-rs/espup/releases/latest/download/espup-x86_64-unknown-linux-gnu -o espup
          chmod +x espup
          ./espup install

      - name: Install Rust toolchain
        if: ${{ !matrix.espup }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install wasm-pack
        if: matrix.wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Format
        run: |
          ${{ matrix.espup && '. $HOME/export-esp.sh &&' || '' }} \
          cargo fmt --manifest-path ${{ matrix.crate }}/Cargo.toml -- --check

      - name: Clippy
        if: ${{ !matrix.skip-clippy }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags || '' }}
        run: |
          ${{ matrix.espup && '. $HOME/export-esp.sh &&' || '' }} \
          cargo clippy --manifest-path ${{ matrix.crate }}/Cargo.toml \
            ${{ matrix.target != 'x86_64-unknown-linux-gnu' && format('--target {0}', matrix.target) || '' }} \
            ${{ matrix.features || '' }}

      - name: Build
        if: ${{ !matrix.wasm-pack }}
        run: |
          ${{ matrix.espup && '. $HOME/export-esp.sh &&' || '' }} \
          cargo build --manifest-path ${{ matrix.crate }}/Cargo.toml \
            ${{ matrix.target != 'x86_64-unknown-linux-gnu' && format('--target {0}', matrix.target) || '' }} \
            ${{ matrix.features || '' }} \
            ${{ matrix.release && '--release' || '' }}

      - name: Build (wasm-pack)
        if: matrix.wasm-pack
        run: wasm-pack build ${{ matrix.crate }} --target web --out-dir www/pkg

  test:
    name: test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Test (link)
        run: cargo test --manifest-path link/Cargo.toml --features std
