[package]
name = "ctl"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "ctl"
path = "src/main.rs"

[dependencies]
link = { path = "../core" }
tokio = { version = "1.48.0", features = ["full"] }
tokio-serial = "5.4"
clap = { version = "4", features = ["derive"] }
embedded-io-adapters = { version = "0.7.0", features = ["tokio-1"] }
