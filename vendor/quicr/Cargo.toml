[package]
name = "quicr"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
authors = ["QuicR Contributors"]
license = "BSD-2-Clause"
description = "Safe Rust FFI bindings for libquicr MoQ pub/sub transport with Embassy async runtime"
repository = "https://github.com/Quicr/libquicr-rust"
documentation = "https://docs.rs/quicr"
readme = "README.md"
keywords = ["quic", "moq", "pubsub", "embassy"]
categories = ["network-programming", "asynchronous"]
build = "build.rs"
links = "quicr"

[features]
default = ["std", "mbedtls"]

# Standard library support
std = [
    "bytes/std",
    "log/std",
    "thiserror/std",
    "embassy-time/std",
    "critical-section/std",
]

# ESP-IDF component build - libquicr is built as an ESP-IDF component via esp-idf-sys
# Requires: quicr esp-component/ directory added to ESP-IDF's EXTRA_COMPONENT_DIRS
esp-idf = ["std"]

# TLS backend selection - choose one
mbedtls = []
openssl = []
boringssl = []

# Logging with defmt (for embedded)
defmt-logging = ["defmt", "embassy-time/defmt"]

[dependencies]
bytes = { version = "1.7", default-features = false }
log = { version = "0.4", default-features = false }
defmt = { version = "0.3", optional = true }
thiserror = { version = "2.0", default-features = false }
heapless = { version = "0.9", default-features = false }

# Embassy async runtime
embassy-time = { version = "0.5", default-features = false, features = ["tick-hz-1_000_000"] }
embassy-sync = { version = "0.7", default-features = false }
embassy-futures = { version = "0.1", default-features = false }

critical-section = { version = "1.2" }

[build-dependencies]
bindgen = "0.71"
cc = "1.2"
cmake = "0.1"
pkg-config = "0.3"

[dev-dependencies]
embassy-executor = { version = "0.9", features = ["arch-std", "executor-thread"] }
embassy-time = { version = "0.5", features = ["std"] }
embassy-futures = "0.1"
clap = { version = "4", features = ["derive"] }
ctrlc = "3.4"
env_logger = "0.11"

[profile.dev]
opt-level = "s"

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "s"
overflow-checks = false

[package.metadata.docs.rs]
default-target = "x86_64-unknown-linux-gnu"
features = ["std"]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
